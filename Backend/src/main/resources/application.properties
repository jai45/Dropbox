spring.application.name=dropbox-backend
spring.datasource.url=jdbc:postgresql://ep-wild-credit-aij6rqp4-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=${NEON_USERNAME}
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiry-ms=900000
jwt.refresh-expiry-ms=2592000000

# Cloudflare R2
r2.account-id=${R2_ACCOUNT_ID}
r2.endpoint=https://cdf9c62abdc61b381c59dc4e976edf72.r2.cloudflarestorage.com
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket=${R2_BUCKET}
r2.presign-duration-minutes=${R2_DURATION}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true


spring.devtools.restart.enabled=true